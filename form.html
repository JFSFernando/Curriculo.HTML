<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro">
        <fieldset>

            <div>
                <label for="">Nome completo</label>
                <input type="text" name="nomecompleto"id="nomecompleto">
                <!--Padrao de nomeclatura  - nome completo camelcase-->
            </div>
<br>
            <div>
                <label for="">E-mail</label>
                <input required type="E-mail" name="E-mail" id="E-mail">
            </div>  
<br>
            <div>
                <label for="senha">Senha</label>
                <input  required type="password" name="senha" id="senha">
            </div>
<br>
            <div>
                <label for="Telefone">Telefone</label>
                <input required type="Tel" maxlength="9" name="telefone" id="Telefone" placeholder="(11)">
            </div>    
            <br>
            <div>
                <label for="mensagem">mensagem</label>
                <textarea name="mensagem" rows="5" id="">mensagem</textarea>
            </div>
            <br>
<div>
                <label for="estadocivil">Estado civil</label>
                <select name="estadocivil" id="estadocivil">
                    <option value="solteiro">Solteiro</option>
                    <option value="casado">Casado</option>
                    <option value="divorciado">Divorciado</option>
                    <option value="viuvo">Viuvo</option>      
                </select>
            </div>
            <br>
            <div>
                <label for="dataNascimento">Data de Nascimento</label>
                <input type="date" name="dataNascimento" id="dataNascimento">
                <input type="time" name="dataNascimento" id="dataNascimento">
            </div>
<br>
            <div>
                <input type="file" name="arquivo" id="arquivo">
            </div>   
<br>

<button type="submit">Enviar mensagem</button>
<button type="reset"> Limpar formulario </button>

        
        </fieldset>

    </form>
    
</body>
</html>
